<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小猪工具箱 / Pan's Toolbox</title>
<style>
:root{--bg:#0d0d1a;--surf:#161630;--card:#1e1e3a;--text:#e0e0f0;--mut:#7777aa;--pri:#7c5cfc;--pr2:#a78bfa;--grn:#34d399;--red:#f87171;--yel:#fbbf24;--r:12px;--gap:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:220px;background:var(--surf);padding:20px 0;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.05);overflow-y:auto;position:sticky;top:0;height:100vh}
.sidebar h2{padding:0 20px 16px;font-size:1rem;text-align:center;background:linear-gradient(135deg,var(--pr2),#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar .cat{font-size:.68rem;color:var(--mut);padding:12px 20px 4px;text-transform:uppercase;letter-spacing:1px}
.sidebar .tool{display:block;padding:9px 20px;color:var(--mut);font-size:.84rem;cursor:pointer;text-decoration:none;transition:all .2s;border-left:2px solid transparent}
.sidebar .tool:hover,.sidebar .tool.active{color:var(--text);background:rgba(124,92,252,0.08);border-left-color:var(--pri)}
.main{flex:1;padding:24px 32px;overflow-y:auto;min-width:0}
.panel{display:none}
.panel.active{display:block}
.panel h3{font-size:1.15rem;margin-bottom:20px;color:var(--pr2)}
.row{display:flex;gap:var(--gap);flex-wrap:wrap;margin-bottom:14px}
.col{flex:1;min-width:200px}
label{display:block;font-size:.78rem;color:var(--mut);margin-bottom:4px}
input,select,textarea,button{font-family:inherit}
input[type=text],input[type=number],input[type=password],select,textarea{
  width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:var(--surf);color:var(--text);font-size:.88rem;outline:none;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--pri)}
textarea{min-height:100px}
.btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .25s}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:#6a4ce0}
.btn-out{background:transparent;color:var(--pr2);border:1px solid var(--pr2)}.btn-out:hover{background:rgba(124,92,252,0.1)}
.btn-sm{padding:5px 12px;font-size:.75rem}
.btn-copy{background:var(--grn);color:#000;padding:6px 14px;font-size:.78rem;border-radius:6px;border:none;cursor:pointer}
.btn-copy:hover{filter:brightness(1.15)}
.output-box{background:var(--surf);border-radius:8px;padding:14px;font-size:.85rem;word-break:break-all;min-height:44px;border:1px solid rgba(255,255,255,0.05);max-height:160px;overflow-y:auto}
.output-box:empty::after{content:'等待结果...';color:var(--mut)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--grn);color:#000;padding:8px 22px;border-radius:20px;font-size:.8rem;font-weight:600;z-index:999;animation:toastIn .3s,toastOut .3s 2s forwards;pointer-events:none}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}@keyframes toastOut{from{opacity:1}to{opacity:0}}
.hash-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.hash-tab{padding:4px 12px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--mut);font-size:.75rem;cursor:pointer;transition:all .2s}
.hash-tab.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.info-line{font-size:.75rem;color:var(--mut);margin-top:6px}
.swatch{width:60px;height:30px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);display:inline-block;vertical-align:middle;margin-right:8px}
@media(max-width:768px){.sidebar{width:60px}.sidebar h2,.sidebar .cat,.sidebar .tool span,.sidebar .tool{font-size:0;padding:10px 12px}.sidebar .tool{text-align:center}.sidebar .tool::before{font-size:1rem;content:attr(data-emoji)}}
</style>
</head>
<body>

<nav class="sidebar">
  <h2>🐷 小猪工具箱</h2>
  <div class="cat">文本工具</div>
  <a class="tool active" data-emoji="🔐" data-target="pwd"><span>🔐 密码生成器</span></a>
  <a class="tool" data-emoji="📝" data-target="b64"><span>📝 Base64</span></a>
  <a class="tool" data-emoji="🔗" data-target="url"><span>🔗 URL编解码</span></a>
  <a class="tool" data-emoji="📋" data-target="json"><span>📋 JSON格式化</span></a>
  <a class="tool" data-emoji="📏" data-target="count"><span>📏 文字计数</span></a>
  <div class="cat">开发工具</div>
  <a class="tool" data-emoji="⏱" data-target="time"><span>⏱ 时间戳转换</span></a>
  <a class="tool" data-emoji="🔢" data-target="uuid"><span>🔢 UUID生成器</span></a>
  <a class="tool" data-emoji="#" data-target="hash"><span>#️⃣ 哈希计算</span></a>
  <a class="tool" data-emoji="🔍" data-target="regex"><span>🔍 正则测试</span></a>
  <div class="cat">其他工具</div>
  <a class="tool" data-emoji="🎨" data-target="color"><span>🎨 颜色转换</span></a>
  <a class="tool" data-emoji="🎲" data-target="rand"><span>🎲 随机数</span></a>
  <a class="tool" data-emoji="📐" data-target="unit"><span>📐 单位换算</span></a>
</nav>

<main class="main" id="mainContent"></main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script>
// ==================== 框架 ====================
const tools = document.querySelectorAll('.tool');
const main = document.getElementById('mainContent');
const panels = {};

function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
function copyText(txt){navigator.clipboard.writeText(txt).then(()=>toast('已复制✅')).catch(()=>toast('复制失败'))}

tools.forEach(t=>{t.onclick=e=>{e.preventDefault();tools.forEach(x=>x.classList.remove('active'));t.classList.add('active');showPanel(t.dataset.target)}});

function showPanel(id){
  if(!panels[id]){panels[id]=document.getElementById(id)}
  Object.values(panels).forEach(p=>p.style.display='none');
  if(panels[id])panels[id].style.display='block';
}

function initPanels(){
  main.innerHTML = `
    <div class="panel active" id="pwd">${pwdHTML()}</div>
    <div class="panel" id="b64">${b64HTML()}</div>
    <div class="panel" id="url">${urlHTML()}</div>
    <div class="panel" id="json">${jsonHTML()}</div>
    <div class="panel" id="count">${countHTML()}</div>
    <div class="panel" id="time">${timeHTML()}</div>
    <div class="panel" id="uuid">${uuidHTML()}</div>
    <div class="panel" id="hash">${hashHTML()}</div>
    <div class="panel" id="regex">${regexHTML()}</div>
    <div class="panel" id="color">${colorHTML()}</div>
    <div class="panel" id="rand">${randHTML()}</div>
    <div class="panel" id="unit">${unitHTML()}</div>`;
  ['pwd','b64','url','json','count','time','uuid','hash','regex','color','rand','unit'].forEach(id=>panels[id]=document.getElementById(id));
}
initPanels();

// ==================== 1. 密码生成器 ====================
function pwdHTML(){return`<h3>🔐 密码生成器</h3><div class="row"><div class="col"><label>密码长度</label><input type="number" id="pwdLen" value="16" min="4" max="128"></div><div class="col" style="display:flex;flex-direction:column;justify-content:flex-end"><label style="margin-bottom:8px"><input type="checkbox" id="pwdUpper" checked> 大写字母</label><label><input type="checkbox" id="pwdLower" checked> 小写字母</label></div><div class="col" style="display:flex;flex-direction:column;justify-content:flex-end"><label style="margin-bottom:8px"><input type="checkbox" id="pwdNum" checked> 数字</label><label><input type="checkbox" id="pwdSym" checked> 符号</label></div></div><div class="row"><button class="btn btn-pri" onclick="genPwd()">生成密码</button></div><div class="output-box" id="pwdOut"></div><button class="btn-copy" style="margin-top:8px" onclick="copyText(document.getElementById('pwdOut').textContent)">📋 复制</button>`}
function genPwd(){const L=+document.getElementById('pwdLen').value;const u=document.getElementById('pwdUpper').checked;const l=document.getElementById('pwdLower').checked;const n=document.getElementById('pwdNum').checked;const s=document.getElementById('pwdSym').checked;const chars=[];if(u)chars.push('ABCDEFGHJKLMNPQRSTUVWXYZ');if(l)chars.push('abcdefghjkmnpqrstuvwxyz');if(n)chars.push('23456789');if(s)chars.push('!@#$%^&*_+-=');if(!chars.length)return document.getElementById('pwdOut').textContent='请至少选一种字符';const pool=chars.join('');let r='';for(let i=0;i<L;i++)r+=pool[Math.floor(Math.random()*pool.length)];document.getElementById('pwdOut').textContent=r;navigator.clipboard.writeText(r);toast('已生成并复制✅')}

// ==================== 2. Base64 ====================
function b64HTML(){return`<h3>📝 Base64 编解码</h3><div class="row"><div class="col"><label>输入文本</label><textarea id="b64In" placeholder="输入内容..."></textarea></div></div><div class="row"><button class="btn btn-pri" onclick="b64Enc()">编码 → Base64</button><button class="btn btn-out" onclick="b64Dec()">解码 ← Base64</button></div><div class="output-box" id="b64Out"></div><button class="btn-copy" style="margin-top:8px" onclick="copyText(document.getElementById('b64Out').textContent)">📋 复制结果</button>`}
function b64Enc(){try{const t=document.getElementById('b64In').value;document.getElementById('b64Out').textContent=btoa(unescape(encodeURIComponent(t)))}catch(e){document.getElementById('b64Out').textContent=btoa(document.getElementById('b64In').value)}}
function b64Dec(){try{const t=document.getElementById('b64In').value;document.getElementById('b64Out').textContent=decodeURIComponent(escape(atob(t)))}catch(e){document.getElementById('b64Out').textContent='解码失败: '+e.message}}

// ==================== 3. URL编解码 ====================
function urlHTML(){return`<h3>🔗 URL 编解码</h3><div class="row"><div class="col"><label>输入</label><textarea id="urlIn" placeholder="输入URL或文本..."></textarea></div></div><div class="row"><button class="btn btn-pri" onclick="urlEnc()">编码 encodeURIComponent</button><button class="btn btn-out" onclick="urlDec()">解码 decodeURIComponent</button></div><div class="output-box" id="urlOut"></div><button class="btn-copy" style="margin-top:8px" onclick="copyText(document.getElementById('urlOut').textContent)">📋 复制</button>`}
function urlEnc(){document.getElementById('urlOut').textContent=encodeURIComponent(document.getElementById('urlIn').value)}
function urlDec(){try{document.getElementById('urlOut').textContent=decodeURIComponent(document.getElementById('urlIn').value)}catch(e){document.getElementById('urlOut').textContent='解码失败: '+e.message}}

// ==================== 4. JSON格式化 ====================
function jsonHTML(){return`<h3>📋 JSON 格式化</h3><div class="row"><div class="col"><label>输入JSON字符串</label><textarea id="jsonIn" placeholder='{"key":"value"}'></textarea></div></div><div class="row"><button class="btn btn-pri" onclick="jsonFmt()">🎨 格式化</button><button class="btn btn-out" onclick="jsonMin()">📦 压缩</button></div><div class="output-box" id="jsonOut" style="font-family:monospace;white-space:pre-wrap"></div><button class="btn-copy" style="margin-top:8px" onclick="copyText(document.getElementById('jsonOut').textContent)">📋 复制</button>`}
function jsonFmt(){try{const o=JSON.parse(document.getElementById('jsonIn').value);document.getElementById('jsonOut').textContent=JSON.stringify(o,null,2)}catch(e){document.getElementById('jsonOut').textContent='JSON解析错误: '+e.message}}
function jsonMin(){try{const o=JSON.parse(document.getElementById('jsonIn').value);document.getElementById('jsonOut').textContent=JSON.stringify(o)}catch(e){document.getElementById('jsonOut').textContent='JSON解析错误: '+e.message}}

// ==================== 5. 文字计数 ====================
function countHTML(){return`<h3>📏 文字计数器</h3><div class="row"><div class="col"><textarea id="countIn" placeholder="输入文本..." oninput="updateCount()"></textarea></div></div><div class="row" style="gap:16px"><div style="text-align:center;background:var(--surf);border-radius:8px;padding:12px 20px"><div style="font-size:1.5rem;font-weight:700;color:var(--pr2)" id="cntChars">0</div><div style="font-size:.72rem;color:var(--mut)">字符数</div></div><div style="text-align:center;background:var(--surf);border-radius:8px;padding:12px 20px"><div style="font-size:1.5rem;font-weight:700;color:var(--pr2)" id="cntWords">0</div><div style="font-size:.72rem;color:var(--mut)">单词数</div></div><div style="text-align:center;background:var(--surf);border-radius:8px;padding:12px 20px"><div style="font-size:1.5rem;font-weight:700;color:var(--pr2)" id="cntLines">0</div><div style="font-size:.72rem;color:var(--mut)">行数</div></div><div style="text-align:center;background:var(--surf);border-radius:8px;padding:12px 20px"><div style="font-size:1.5rem;font-weight:700;color:var(--pr2)" id="cntBytes">0</div><div style="font-size:.72rem;color:var(--mut)">字节数</div></div></div>`}
function updateCount(){const t=document.getElementById('countIn').value;document.getElementById('cntChars').textContent=t.length;document.getElementById('cntWords').textContent=(t.trim()?t.trim().split(/\s+/).length:0);document.getElementById('cntLines').textContent=(t?t.split('\n').length:0);document.getElementById('cntBytes').textContent=new Blob([t]).size}

// ==================== 6. 时间戳转换 ====================
function timeHTML(){return`<h3>⏱ 时间戳转换</h3><div class="row"><div class="col"><label>当前时间戳</label><div class="output-box" id="nowTs" style="cursor:pointer" onclick="copyText(this.textContent)"></div><span class="info-line">点击复制</span></div></div><div class="row"><div class="col"><label>时间戳 → 日期</label><input type="text" id="tsIn" placeholder="输入秒级时间戳，如 1719700000"><button class="btn btn-pri btn-sm" style="margin-top:6px" onclick="ts2date()">转换</button><div class="output-box" id="tsOut"></div></div><div class="col"><label>日期 → 时间戳</label><input type="text" id="dateIn" placeholder="如 2024-06-30 12:00:00"><button class="btn btn-pri btn-sm" style="margin-top:6px" onclick="date2ts()">转换</button><div class="output-box" id="dateOut"></div></div></div>`}
function ts2date(){const v=document.getElementById('tsIn').value.trim();if(!v)return;let ts=+v;if(ts>9999999999999)ts=Math.floor(ts/1000);const d=new Date(ts*1000);if(isNaN(d.getTime())){document.getElementById('tsOut').textContent='无效时间戳';return}document.getElementById('tsOut').textContent=d.toLocaleString('zh-CN')}
function date2ts(){const v=document.getElementById('dateIn').value.trim();if(!v)return;const ts=Math.floor(new Date(v).getTime()/1000);if(isNaN(ts)){document.getElementById('dateOut').textContent='无效日期';return}document.getElementById('dateOut').textContent=ts}
setInterval(()=>{const el=document.getElementById('nowTs');if(el)el.textContent=Math.floor(Date.now()/1000)},1000);

// ==================== 7. UUID生成器 ====================
function uuidHTML(){return`<h3>🔢 UUID 生成器</h3><div class="row"><button class="btn btn-pri" onclick="genUUID()">生成 UUID v4</button><button class="btn btn-out" onclick="genUUIDs(5)">批量生成 ×5</button></div><div class="output-box" id="uuidOut" style="font-family:monospace"></div><button class="btn-copy" style="margin-top:8px" onclick="copyText(document.getElementById('uuidOut').textContent)">📋 复制</button>`}
function genUUID(){document.getElementById('uuidOut').textContent=crypto.randomUUID()}
function genUUIDs(n){const uuids=[];for(let i=0;i<n;i++)uuids.push(crypto.randomUUID());document.getElementById('uuidOut').textContent=uuids.join('\n')}

// ==================== 8. 哈希计算 ====================
function hashHTML(){return`<h3>#️⃣ 哈希计算</h3><div class="row"><div class="col"><label>输入文本</label><textarea id="hashIn" placeholder="输入要计算哈希的文本..."></textarea></div></div><div class="hash-tabs" id="hashTabs"><button class="hash-tab active" data-algo="MD5">MD5</button><button class="hash-tab" data-algo="SHA1">SHA-1</button><button class="hash-tab" data-algo="SHA256">SHA-256</button><button class="hash-tab" data-algo="SHA512">SHA-512</button></div><div class="output-box" id="hashOut" style="font-family:monospace"></div><button class="btn-copy" style="margin-top:8px" onclick="copyText(document.getElementById('hashOut').textContent)">📋 复制</button>`}
let hashAlgo='MD5';
document.addEventListener('click',function(e){if(e.target.classList.contains('hash-tab')){document.querySelectorAll('.hash-tab').forEach(t=>t.classList.remove('active'));e.target.classList.add('active');hashAlgo=e.target.dataset.algo;doHash()}});
function doHash(){const t=document.getElementById('hashIn')?.value||'';if(!t)return;try{const fn=CryptoJS[hashAlgo];document.getElementById('hashOut').textContent=fn(t).toString()}catch(e){document.getElementById('hashOut').textContent='计算失败'}}
document.addEventListener('input',function(e){if(e.target.id==='hashIn')doHash()});

// ==================== 9. 正则测试 ====================
function regexHTML(){return`<h3>🔍 正则测试器</h3><div class="row"><div class="col"><label>正则表达式</label><input type="text" id="regexPat" placeholder="如 \\d{3}-\\d{4}" oninput="testRegex()"></div><div class="col"><label>修饰符</label><input type="text" id="regexFlags" value="g" placeholder="g,i,m" style="width:80px" oninput="testRegex()"></div></div><div class="row"><div class="col"><label>测试文本</label><textarea id="regexText" placeholder="输入测试文本..." oninput="testRegex()"></textarea></div></div><div class="output-box" id="regexOut" style="white-space:pre-wrap;font-family:monospace;max-height:300px"></div>`}
function testRegex(){const pat=document.getElementById('regexPat').value;const flags=document.getElementById('regexFlags').value;const txt=document.getElementById('regexText').value;const out=document.getElementById('regexOut');if(!pat){out.textContent='';return}try{const re=new RegExp(pat,flags);const matches=[...txt.matchAll(re)];if(matches.length===0){out.textContent='无匹配'}else{out.innerHTML=matches.map((m,i)=>`<div style="margin:4px 0"><span style="color:var(--grn)">[${i}]</span> ${m[0]} <span style="color:var(--mut);font-size:.72rem">位置:${m.index}</span></div>`).join('')}}catch(e){out.textContent='正则错误: '+e.message}}

// ==================== 10. 颜色转换 ====================
function colorHTML(){return`<h3>🎨 颜色转换器</h3><div class="row"><div class="col"><label>HEX / RGB / HSL 输入</label><input type="text" id="colorIn" placeholder="#7c5cfc 或 rgb(124,92,252) 或 hsl(250,90%,70%)" oninput="convertColor()"><input type="color" id="colorPick" value="#7c5cfc" oninput="document.getElementById('colorIn').value=this.value;convertColor()" style="width:50px;height:36px;padding:0;border:none;cursor:pointer;margin-left:8px"></div></div><div class="output-box" id="colorOut"></div>`}
function convertColor(){
  const v=document.getElementById('colorIn').value.trim();
  if(!v){document.getElementById('colorOut').textContent='';return}
  document.getElementById('colorPick').value=v.startsWith('#')?v:'#000000';
  if(v.startsWith('#')){
    let h=v;
    if(h.length===4)h='#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3];
    const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    if(isNaN(r)){document.getElementById('colorOut').textContent='无效颜色';return}
    document.getElementById('colorPick').value=h;
    document.getElementById('colorOut').innerHTML=`<span class="swatch" style="background:${h}"></span>HEX: ${h}<br><span class="info-line">RGB: rgb(${r},${g},${b}) &nbsp; RGBA: rgba(${r},${g},${b},0.5)<br>HSL: hsl(${rgb2hsl(r,g,b)})</span>`;
  }else{document.getElementById('colorOut').textContent='请输入HEX格式如 #7c5cfc'}
}
function rgb2hsl(r,g,b){r/=255;g/=255;b/=255;const M=Math.max(r,g,b),m=Math.min(r,g,b);const l=(M+m)/2;if(M===m)return`0,0%,${Math.round(l*100)}%`;const d=M-m;const s=l>0.5?d/(2-M-m):d/(M+m);let h;switch(M){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6}return`${Math.round(h*360)},${Math.round(s*100)}%,${Math.round(l*100)}%`}

// ==================== 11. 随机数 ====================
function randHTML(){return`<h3>🎲 随机数生成器</h3><div class="row"><div class="col"><label>最小值</label><input type="number" id="randMin" value="1"></div><div class="col"><label>最大值</label><input type="number" id="randMax" value="100"></div><div class="col" style="display:flex;align-items:flex-end"><button class="btn btn-pri" onclick="genRand()">生成</button></div></div><div class="output-box" id="randOut" style="font-size:2rem;text-align:center;font-weight:700;color:var(--pr2)"></div><button class="btn-copy" style="margin-top:8px" onclick="copyText(document.getElementById('randOut').textContent)">📋 复制</button>`}
function genRand(){const min=+document.getElementById('randMin').value;const max=+document.getElementById('randMax').value;if(min>=max){document.getElementById('randOut').textContent='最小值必须小于最大值';return}document.getElementById('randOut').textContent=Math.floor(Math.random()*(max-min+1))+min}

// ==================== 12. 单位换算 ====================
function unitHTML(){return`<h3>📐 单位换算器</h3><div class="row"><div class="col"><label>数值</label><input type="number" id="unitVal" value="1" oninput="convertUnit()"></div><div class="col"><label>类型</label><select id="unitType" onchange="convertUnit()"><option value="length">📏 长度</option><option value="weight">⚖️ 重量</option><option value="temp">🌡 温度</option><option value="area">📐 面积</option></select></div></div><div class="output-box" id="unitOut" style="font-family:monospace;white-space:pre-wrap"></div>`}
function convertUnit(){
  const v=+document.getElementById('unitVal').value||0;
  const t=document.getElementById('unitType').value;
  const u={
    length:[{u:'毫米mm',f:x=>x*1000},{u:'厘米cm',f:x=>x*100},{u:'米m',f:x=>x},{u:'千米km',f:x=>x/1000},{u:'英寸in',f:x=>x*39.37},{u:'英尺ft',f:x=>x*3.2808},{u:'码yd',f:x=>x*1.0936},{u:'英里mi',f:x=>x*0.00062137}],
    weight:[{u:'毫克mg',f:x=>x*1e6},{u:'克g',f:x=>x*1000},{u:'千克kg',f:x=>x},{u:'吨t',f:x=>x/1000},{u:'磅lb',f:x=>x*2.2046},{u:'盎司oz',f:x=>x*35.274}],
    temp:[{u:'摄氏度°C',f:x=>x},{u:'华氏度°F',f:x=>x*9/5+32},{u:'开尔文K',f:x=>x+273.15}],
    area:[{u:'平方毫米mm²',f:x=>x*1e6},{u:'平方厘米cm²',f:x=>x*10000},{u:'平方米m²',f:x=>x},{u:'公顷ha',f:x=>x/10000},{u:'平方千米km²',f:x=>x/1e6},{u:'亩',f:x=>x*0.0015}]
  }[t];
  document.getElementById('unitOut').textContent=u.map(o=>`${o.f(v).toFixed(4)} ${o.u}`).join('\n');
}

setTimeout(()=>{convertColor();convertUnit();genUUID();document.getElementById('nowTs').textContent=Math.floor(Date.now()/1000)},300);
</script>
